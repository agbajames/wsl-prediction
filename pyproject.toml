[tool.pytest.ini_options]
addopts = "-ra --strict-config --strict-markers"
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [
    ".git",
    ".pytest_cache",
    "__pycache__",
    "venv",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]
