model_name: neural_network
model_family: research_tabular_mlp
model_version: v2
required_columns:
  - match_date
  - home_team
  - away_team
  - home_goals
  - away_goals

config:
  hidden_units: 8
  hidden_layers:
    - 8
  learning_rate: 0.03
  l2_penalty: 0.01
  dropout: 0.0
  max_iter: 500
  early_stopping: true
  validation_fraction: 0.2
  early_stopping_patience: 20
  min_validation_matches: 3
  min_training_matches: 12
  random_seed: 42
  feature_group: xg
  recent_window: 4

notes: >
  Research-only neural-network challenger. The registered default remains a
  tiny one-hidden-layer MLP over leakage-safe xG features, while the dedicated
  experiment runner can test the no-hidden-layer softmax baseline and gradually
  larger NumPy MLP architectures. It should not be considered for production
  promotion from one WSL season.
